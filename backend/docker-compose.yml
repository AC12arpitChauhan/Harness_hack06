# PostgreSQL for running the app against the production-target database.
# The app still boots with zero setup on SQLite (the default) — this is only
# needed when you want to exercise the Postgres path.
#
#   docker compose up -d
#   export DATABASE_URL=postgresql+psycopg2://prhealth:prhealth@localhost:5432/prhealth
#   alembic upgrade head && uvicorn app.main:app --reload
services:
  postgres:
    image: postgres:16
    container_name: prhealth-postgres
    environment:
      POSTGRES_USER: prhealth
      POSTGRES_PASSWORD: prhealth
      POSTGRES_DB: prhealth
    ports:
      - "5432:5432"
    volumes:
      - prhealth_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prhealth"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  prhealth_pg:
