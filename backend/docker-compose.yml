# Full stack: app + PostgreSQL.
#
#   docker compose up --build
#   open http://localhost:8000/dashboard
#
# Env overrides: copy .env.example → .env and set GITHUB_TOKEN / HARNESS_TOKEN etc.
services:
  postgres:
    image: postgres:16
    container_name: prhealth-postgres
    environment:
      POSTGRES_USER: prhealth
      POSTGRES_PASSWORD: prhealth
      POSTGRES_DB: prhealth
    ports:
      - "5432:5432"
    volumes:
      - prhealth_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prhealth"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: prhealth-app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://prhealth:prhealth@postgres:5432/prhealth
      FASTAPI_AUTH_TOKEN: ${FASTAPI_AUTH_TOKEN:-dev-token}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      HARNESS_TOKEN: ${HARNESS_TOKEN:-}
      HARNESS_API_URL: ${HARNESS_API_URL:-https://app.harness.io}
      HARNESS_ACCOUNT_ID: ${HARNESS_ACCOUNT_ID:-}
      HARNESS_ORG_ID: ${HARNESS_ORG_ID:-}
      HARNESS_PROJECT_ID: ${HARNESS_PROJECT_ID:-}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WRITEBACK_ENABLED: ${WRITEBACK_ENABLED:-false}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  prhealth_pg:
