# The bearer token the pipeline sends to the PR Health service. Its value MUST
# equal FASTAPI_AUTH_TOKEN in the service's .env. Easiest: create it in the UI
# (Project Setup -> Secrets -> + New Secret -> Text). This YAML is the shape if
# you prefer the API/GitOps; replace <PASTE_VALUE> with the same token string.
secret:
  type: SecretText
  name: pr_health_api_token
  identifier: pr_health_api_token
  orgIdentifier: default
  projectIdentifier: CIBootcamp2026
  spec:
    secretManagerIdentifier: harnessSecretManager
    valueType: Inline
    value: <PASTE_VALUE>   # == FASTAPI_AUTH_TOKEN in backend/.env
