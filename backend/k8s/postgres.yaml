apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: hack06-pr-health
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
  # storageClassName: standard   # uncomment + set if the cluster has no default StorageClass
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: hack06-pr-health
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate            # single writer on a ReadWriteOnce volume
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_USER, value: prhealth }
            - { name: POSTGRES_DB, value: prhealth }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: pr-health-secrets, key: POSTGRES_PASSWORD } } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U prhealth -d prhealth"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U prhealth -d prhealth"] }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: hack06-pr-health
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
