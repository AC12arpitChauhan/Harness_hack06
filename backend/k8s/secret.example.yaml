# TEMPLATE ONLY — never put real secrets here. The deploy pipeline creates the
# real Secret from Harness secrets (see harness/deploy-pipeline.yaml). If you have
# direct kubectl access instead, copy this to secret.local.yaml (gitignored), fill
# it, and `kubectl apply -f` that copy.
apiVersion: v1
kind: Secret
metadata:
  name: pr-health-secrets
  namespace: hack06-pr-health
type: Opaque
stringData:
  GITHUB_TOKEN: "REPLACE_github_pat"            # repo: read PR + write comment/status
  FASTAPI_AUTH_TOKEN: "REPLACE_bearer_token"    # gate on POST /analyze
  BEDROCK_API_KEY: "REPLACE_bedrock_api_key"    # the ABSK… Bedrock key
  # Full SQLAlchemy URL incl. password (kept here, not in the Deployment env):
  DATABASE_URL: "postgresql+psycopg2://prhealth:REPLACE_pw@postgres:5432/prhealth"
  POSTGRES_PASSWORD: "REPLACE_pw"               # same pw as in DATABASE_URL
  # OPTIONAL — Slack build-failure alerts. Omit to keep alerts disabled (no-op).
  # SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
