apiVersion: v1
kind: Namespace
metadata:
  name: pr-health
---
# Secrets injected by Harness CD. In Harness, set these from Harness Secrets:
#   FASTAPI_AUTH_TOKEN: <+secret.getValue("prhealth_auth_token")>
#   GITHUB_TOKEN:       <+secret.getValue("github_token")>
#   HARNESS_TOKEN:      <+secret.getValue("harness_pat")>
#   DATABASE_URL:       <+secret.getValue("prhealth_db_url")>
apiVersion: v1
kind: Secret
metadata:
  name: pr-health-secrets
  namespace: pr-health
type: Opaque
stringData:
  FASTAPI_AUTH_TOKEN: "REPLACE_OR_INJECT_VIA_HARNESS_SECRET"
  GITHUB_TOKEN: ""
  HARNESS_TOKEN: ""
  DATABASE_URL: "sqlite:///./prod.db"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-health
  namespace: pr-health
  labels: { app: pr-health }
spec:
  replicas: 1
  selector:
    matchLabels: { app: pr-health }
  template:
    metadata:
      labels: { app: pr-health }
    spec:
      containers:
        - name: pr-health
          image: <+artifact.image>
          ports:
            - containerPort: 8000
          env:
            - name: HARNESS_API_URL
              value: "https://app.harness.io"
            - name: HARNESS_ACCOUNT_ID
              value: ""          # set your account ID here
            - name: HARNESS_ORG_ID
              value: ""
            - name: HARNESS_PROJECT_ID
              value: ""
            - name: LLM_ENABLED
              value: "false"
            - name: WRITEBACK_ENABLED
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pr-health-secrets
                  key: DATABASE_URL
            - name: FASTAPI_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pr-health-secrets
                  key: FASTAPI_AUTH_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pr-health-secrets
                  key: GITHUB_TOKEN
            - name: HARNESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pr-health-secrets
                  key: HARNESS_TOKEN
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: pr-health
  namespace: pr-health
spec:
  type: LoadBalancer
  selector: { app: pr-health }
  ports:
    - port: 80
      targetPort: 8000
