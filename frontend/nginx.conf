server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: every unknown path falls back to index.html so React Router routes
    # like /repos/:id/prs/:id work on a hard refresh / deep link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache hashed assets aggressively; never cache index.html
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
